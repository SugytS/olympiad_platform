{% extends "base.html" %}
{% block content %}
<div class="app-hero" style="min-height: calc(100vh - 180px); display: flex; flex-direction: column; justify-content: center;">
    <h1>Олимпиадное программирование</h1>
    <p class="lead mb-4">
        Задачи с автоматической проверкой, темы по алгоритмам и рейтинг — в спокойном интерфейсе без лишнего шума.
    </p>
    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="{{ url_for('topics_list') }}" class="btn btn-primary btn-lg px-4">К темам</a>
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-lg px-4">Регистрация</a>
        {% endif %}
    </div>
</div>
{% endblock %}
