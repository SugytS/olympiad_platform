{% extends "base.html" %}
{% block content %}
<div class="px-4 py-5 my-5 text-center">
    <h1 class="display-5 fw-bold">Добро пожаловать!</h1>
    <div class="col-lg-6 mx-auto">
        <p class="lead mb-4">
            Платформа для развития навыков олимпиадного программирования.<br>
            Изучайте алгоритмы, решайте задачи, получайте обратную связь.
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('topics_list') }}" class="btn btn-primary btn-lg px-4 gap-3">Начать обучение</a>
            {% if not current_user.is_authenticated %}
                <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-lg px-4">Регистрация</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
