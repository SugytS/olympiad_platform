{% extends "admin/base.html" %}
{% block content %}
<h1 class="text-center">Панель управления</h1>
<div class="row mt-4 justify-content-center">
    <div class="col-md-3">
        <div class="card text-white mb-3 text-center" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
            <div class="card-body">
                <h5 class="card-title">Темы</h5>
                <p class="display-4">{{ topics_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white mb-3 text-center" style="background: linear-gradient(135deg, #1e5f4a, #2d8f6e);">
            <div class="card-body">
                <h5 class="card-title">Задачи</h5>
                <p class="display-4">{{ tasks_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white mb-3 text-center" style="background: linear-gradient(135deg, #3a3f44, #555b62);">
            <div class="card-body">
                <h5 class="card-title">Пользователи</h5>
                <p class="display-4">{{ users_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white mb-3 text-center" style="background: linear-gradient(135deg, #6b2e4a, #9e4268);">
            <div class="card-body">
                <h5 class="card-title">Решения</h5>
                <p class="display-4">{{ submissions_count }}</p>
            </div>
        </div>
    </div>
</div>
<div class="row mt-4 justify-content-center">
    <div class="col-md-4 d-flex justify-content-center">
        <a href="{{ url_for('admin_topics') }}" class="btn w-100 py-3 text-center" style="background-color: #2a5298; color: white;">Управление темами</a>
    </div>
    <div class="col-md-4 d-flex justify-content-center">
        <a href="{{ url_for('admin_tasks') }}" class="btn w-100 py-3 text-center" style="background-color: #2d8f6e; color: white;">Управление задачами</a>
    </div>
    <div class="col-md-4 d-flex justify-content-center">
        <a href="{{ url_for('admin_users') }}" class="btn w-100 py-3 text-center" style="background-color: #555b62; color: white;">Управление пользователями</a>
    </div>
</div>
{% endblock %}
