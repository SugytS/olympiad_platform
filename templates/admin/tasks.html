{% extends "admin/base.html" %}
{% block content %}
<h1>Управление задачами</h1>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3">← Назад</a>
<a href="{{ url_for('add_task') }}" class="btn btn-primary mb-3">+ Добавить задачу</a>
<table class="table table-striped">
    <thead>
        <tr><th>ID</th><th>Название</th><th>Тема</th><th>Лимит времени</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.topic.title if task.topic else "—" }}</td>
            <td>{{ task.time_limit }} сек</td>
            <td>
                <a href="{{ url_for('edit_task', task_id=task.id) }}" class="btn btn-sm btn-info">✏️</a>
                <a href="{{ url_for('delete_task', task_id=task.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить задачу?')">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
