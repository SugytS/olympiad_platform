{% extends "base.html" %}
{% block content %}
<h1>Управление темами</h1>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3">← Назад</a>
<a href="{{ url_for('add_topic') }}" class="btn btn-primary mb-3">+ Добавить тему</a>
<table class="table">
    <thead><tr><th>ID</th><th>Название</th><th>Порядок</th><th>Задач</th><th>Действия</th></tr></thead>
    <tbody>
        {% for topic in topics %}
        <tr>
            <td>{{ topic.id }}</td>
            <td>{{ topic.title }}</td>
            <td>{{ topic.order }}</td>
            <td>{{ topic.tasks|length }}</td>
            <td>
                <a href="{{ url_for('edit_topic', topic_id=topic.id) }}" class="btn btn-sm btn-info">✏️</a>
                <a href="{{ url_for('delete_topic', topic_id=topic.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить тему и все её задачи?')">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
