{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-4">Рейтинг</h1>
<div class="card app-card">
    <div class="card-body p-0">
        <div class="app-table-wrap">
        <table class="table table-striped table-hover mb-0">
            <thead>
                <tr><th class="ps-3">Место</th><th></th><th>Пользователь</th><th class="pe-3">Решено</th></tr>
            </thead>
            <tbody>
                {% for r in rating %}
                <tr>
                    <td class="ps-3">{{ r.rank }}</td>
                    <td style="width:52px;">
                        {% if r.avatar %}
                            <img src="{{ url_for('static', filename='avatars/' + r.avatar) }}" alt="" class="rounded-circle" style="width: 40px; height: 40px; object-fit: cover;">
                        {% else %}
                            <div class="rounded-circle bg-light border" style="width: 40px; height: 40px;"></div>
                        {% endif %}
                    </td>
                    <td>{{ r.name }}</td>
                    <td class="pe-3">{{ r.solved }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
