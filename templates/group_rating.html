{% extends "base.html" %}
{% block content %}
<h1>Рейтинг группы: {{ group.name }}</h1>
<div class="card app-card">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr><th>Место</th><th>Аватар</th><th>Пользователь</th><th>Баллы</th></tr>
            </thead>
            <tbody>
                {% for r in rating %}
                <tr>
                    <td>{{ r.rank }}</td>
                    <td>
                        {% if r.avatar %}
                            <img src="{{ url_for('static', filename='avatars/' + r.avatar) }}" alt="avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                        {% else %}
                            <div style="width: 40px; height: 40px; border-radius: 50%; background-color: #ccc;"></div>
                        {% endif %}
                    </td>
                    <td>{{ r.user.name }}</td>
                    <td>{{ r.score }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<a href="{{ url_for('group_tasks_list', group_id=group.id) }}" class="btn btn-secondary mt-3">← К задачам группы</a>
{% endblock %}
