{% extends "base.html" %}
{% block content %}
<h2>Результат проверки</h2>
<div class="card mt-3">
    <div class="card-header">
        <strong>Статус:</strong>
        <span class="badge bg-{{ 'success' if submission.status == 'OK' else 'danger' if submission.status in ['WA', 'RE', 'CE', 'TL'] else 'secondary' }}">
            {{ submission.status }}
        </span>
        <span class="ms-3">Язык: {{ submission.language|upper }}</span>
    </div>
    <div class="card-body">
        <pre class="bg-dark text-light p-3 rounded">{{ submission.details }}</pre>
        <a href="{{ url_for('task_detail', task_id=submission.task_id) }}" class="btn btn-secondary">Вернуться к задаче</a>
    </div>
</div>
{% endblock %}
