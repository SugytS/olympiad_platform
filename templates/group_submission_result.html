{% extends "base.html" %}
{% block content %}
<h2>Результат проверки</h2>
<div class="card">
    <div class="card-header">
        <strong>Статус:</strong> 
        <span class="badge bg-{{ 'success' if submission.status == 'OK' else 'danger' if submission.status in ['WA','RE','CE','TL'] else 'secondary' }}">
            {{ submission.status }}
        </span>
    </div>
    <div class="card-body">
        <pre class="bg-dark text-white p-3 rounded">{{ submission.details }}</pre>
        <a href="{{ url_for('group_tasks_list', group_id=submission.task.group_id) }}" class="btn btn-secondary">Вернуться к задачам группы</a>
    </div>
</div>
{% endblock %}
